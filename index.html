<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #667eea;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
        }
        h1 {
            color: #333;
        }
        .bio {
            color: #666;
            margin: 20px 0;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Your Name Here</h1>
        <p>Web Developer</p>
        <div class="bio">
            Hello! This is my personal website.
        </div>
        <a href="#" class="btn">Contact Me</a>
    </div>
</body>
</html>
